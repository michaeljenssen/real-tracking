<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Real Tracking">
<meta name="theme-color" content="#000000">
<title>Real Tracking</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;overflow:hidden;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.screen.active{opacity:1;pointer-events:all;}

#mainScreen{flex-direction:column;background:#000;}

/* Header */
.app-header{padding:56px 16px 0;}
.app-header-row{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:8px;}
.app-title{font-size:34px;font-weight:700;letter-spacing:-0.5px;}
.hdr-icons{display:flex;gap:4px;align-items:center;padding-bottom:4px;}
.hdr-icon{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Search */
.search-wrap{padding:8px 16px;}
.search-inner{background:#1C1C1E;border-radius:10px;padding:7px 12px;display:flex;align-items:center;gap:6px;}
.search-inner input{background:none;border:none;outline:none;color:#fff;font-size:15px;flex:1;font-family:inherit;}
.search-inner input::placeholder{color:#636366;}
.search-cancel{background:none;border:none;color:#FF3B30;font-size:15px;cursor:pointer;padding:0 0 0 8px;white-space:nowrap;}
.search-wrap.hidden{display:none;}

/* Divider */
.list-divider{height:1px;background:rgba(255,255,255,0.1);margin:0 16px;}

/* List */
.session-list{flex:1;overflow-y:auto;padding-bottom:240px;}
.session-list::-webkit-scrollbar{display:none;}

.session-item{
padding:12px 16px;
border-bottom:1px solid rgba(255,255,255,0.08);
cursor:pointer;
transition:background 0.1s;
}
.session-item:active{background:rgba(255,255,255,0.06);}
.session-item-name{font-size:17px;font-weight:600;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.session-item-meta{font-size:13px;color:#636366;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Empty */
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:40vh;gap:10px;}
.empty-wrap svg{opacity:0.25;}
.empty-txt{font-size:15px;color:#636366;}

/* RECORDING PANEL */
.rec-panel{
position:fixed;bottom:0;left:0;right:0;
background:#1C1C1E;
border-radius:16px 16px 0 0;
transform:translateY(100%);
transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);
z-index:50;
padding-bottom:env(safe-area-inset-bottom,20px);
}
.rec-panel.open{transform:translateY(0);}
.rec-grip{width:36px;height:5px;background:#3A3A3C;border-radius:3px;margin:10px auto 16px;}
.rec-title{font-size:17px;font-weight:600;text-align:center;padding:0 60px;margin-bottom:2px;min-height:22px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rec-timer{font-size:13px;color:#8E8E93;text-align:center;margin-bottom:16px;min-height:18px;letter-spacing:0.02em;}

/* Scrolling waveform - Voice Memo style */
.rec-wave-wrap{position:relative;height:60px;margin:0 0 20px;overflow:hidden;}
#recWave{display:block;width:100%;height:60px;}
/* Center line indicator */
.wave-center{position:absolute;top:0;bottom:0;left:50%;width:2px;background:rgba(255,59,48,0.6);pointer-events:none;}

/* Controls */
.rec-controls{display:flex;align-items:center;justify-content:space-between;padding:0 44px 16px;}
.ctrl-btn{
width:56px;height:56px;border-radius:50%;
background:#2C2C2E;border:none;
color:#fff;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:opacity 0.2s;
}
.ctrl-btn.invisible{opacity:0;pointer-events:none;}

/* Big record button */
.rec-main-btn{
width:80px;height:80px;border-radius:50%;
background:#2C2C2E;border:none;
display:flex;align-items:center;justify-content:center;
cursor:pointer;flex-shrink:0;
}
.rec-main-inner{
width:56px;height:56px;border-radius:50%;
background:#FF3B30;
transition:all 0.22s cubic-bezier(0.34,1.2,0.64,1);
}
.rec-main-btn.recording .rec-main-inner{
border-radius:6px;width:26px;height:26px;
}

/* Transcribing badge */
.rec-transcribing{
display:none;align-items:center;justify-content:center;
gap:6px;padding:0 0 6px;
font-size:12px;color:#FF9500;font-weight:500;
}
.rec-transcribing.show{display:flex;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.15;}}
.t-dot{width:5px;height:5px;border-radius:50%;background:#FF9500;animation:blink 1.1s ease-in-out infinite;}

/* DETAIL */
.detail-screen{
position:fixed;inset:0;background:#000;
transform:translateX(100%);
transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);
z-index:100;display:flex;flex-direction:column;
}
.detail-screen.open{transform:translateX(0);}
.detail-nav{
padding:56px 16px 12px;
display:flex;align-items:center;justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,0.1);
}
.detail-back{background:none;border:none;color:#FF3B30;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:3px;padding:0;}
.detail-nav-actions{display:flex;gap:20px;}
.detail-nav-btn{background:none;border:none;color:#FF3B30;cursor:pointer;padding:2px;}

.detail-body{flex:1;overflow-y:auto;padding:20px 16px 40px;}
.detail-name-input{font-size:22px;font-weight:700;color:#fff;background:none;border:none;outline:none;width:100%;margin-bottom:4px;font-family:inherit;}
.detail-meta{font-size:13px;color:#636366;margin-bottom:24px;}
.detail-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#636366;margin-bottom:10px;}
.detail-transcript{font-size:16px;line-height:1.65;color:#fff;white-space:pre-wrap;}
.detail-no-transcript{font-size:15px;color:#636366;font-style:italic;}
</style>

</head>
<body>

<div class="screen active" id="mainScreen">
  <div class="app-header">
    <div class="app-header-row">
      <div class="app-title">Voice Memos</div>
      <div class="hdr-icons">
        <button class="hdr-icon" onclick="toggleSearch()">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="6" stroke="#fff" stroke-width="1.8"/>
            <path d="M13.5 13.5L17 17" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="hdr-icon" onclick="showOptions()">
          <svg width="16" height="4" viewBox="0 0 20 5" fill="none">
            <circle cx="2.5" cy="2.5" r="2" fill="#fff"/>
            <circle cx="10" cy="2.5" r="2" fill="#fff"/>
            <circle cx="17.5" cy="2.5" r="2" fill="#fff"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="search-wrap hidden" id="searchWrap">
    <div class="search-inner">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
        <circle cx="9" cy="9" r="6" stroke="#636366" stroke-width="2"/>
        <path d="M13.5 13.5L17 17" stroke="#636366" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Search" oninput="filterSessions()">
      <button class="search-cancel" onclick="toggleSearch()">Cancel</button>
    </div>
  </div>

  <div class="list-divider"></div>

  <div class="session-list" id="sessionList">
    <div class="empty-wrap" id="emptyWrap">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="#fff" stroke-width="1.2"/>
        <rect x="10" y="6" width="4" height="8" rx="2" stroke="#fff" stroke-width="1.2"/>
        <path d="M8 12a4 4 0 0 0 8 0" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="12" y1="16" x2="12" y2="19" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <div class="empty-txt">No Recordings</div>
    </div>
  </div>

  <!-- Recording panel -->

  <div class="rec-panel" id="recPanel">
    <div class="rec-grip"></div>
    <div class="rec-title" id="recTitle">New Recording</div>
    <div class="rec-timer" id="recTimer">&nbsp;</div>
    <div class="rec-transcribing" id="recTranscribing">
      <div class="t-dot"></div>Transcribing
    </div>
    <div class="rec-wave-wrap">
      <canvas id="recWave" height="60"></canvas>
      <div class="wave-center"></div>
    </div>
    <div class="rec-controls">
      <button class="ctrl-btn invisible" id="deleteBtn" onclick="cancelRec()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="rec-main-btn" id="recMainBtn" onclick="toggleRec()">
        <div class="rec-main-inner"></div>
      </button>
      <button class="ctrl-btn invisible" id="pauseBtn" onclick="togglePause()">
        <svg id="pauseIcon" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="6" y="5" width="4" height="14" rx="1.5" fill="#fff"/>
          <rect x="14" y="5" width="4" height="14" rx="1.5" fill="#fff"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Detail -->

<div class="detail-screen" id="detailScreen">
  <div class="detail-nav">
    <button class="detail-back" onclick="closeDetail()">
      <svg width="9" height="16" viewBox="0 0 9 16" fill="none">
        <path d="M8 1L1 8l7 7" stroke="#FF3B30" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      All Recordings
    </button>
    <div class="detail-nav-actions">
      <button class="detail-nav-btn" onclick="shareSession()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" stroke="#FF3B30" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="16 6 12 2 8 6" stroke="#FF3B30" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="12" y1="2" x2="12" y2="15" stroke="#FF3B30" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="detail-nav-btn" onclick="deleteSession()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="#FF3B30" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="detail-body">
    <input class="detail-name-input" id="detailName" type="text">
    <div class="detail-meta" id="detailMeta"></div>
    <div class="detail-section-title">Transcript</div>
    <div id="detailTranscript"></div>
  </div>
</div>

<script>
  let sessions = [];
  let currentIdx = -1;
  let isRec = false;
  let isPaused = false;
  let mediaRec = null;
  let recStream = null;
  let audioChunks = [];
  let audioCtx = null;
  let analyser = null;
  let waveAF = null;
  let recInterval = null;
  let recSecs = 0;
  let recognition = null;
  let liveTranscript = '';
  let waveData = []; // scrolling waveform history

  // Init
  window.addEventListener('load', () => {
    loadSessions();
    setTimeout(() => document.getElementById('recPanel').classList.add('open'), 150);
    resizeWave();
    window.addEventListener('resize', resizeWave);
    drawWave();
  });

  function resizeWave() {
    const c = document.getElementById('recWave');
    c.width = c.offsetWidth;
  }

  // Storage
  function loadSessions() {
    const s = localStorage.getItem('rt_v3');
    sessions = s ? JSON.parse(s) : [];
    renderList();
  }

  function saveSessions() {
    localStorage.setItem('rt_v3', JSON.stringify(sessions));
  }

  // Render list
  function renderList(filter) {
    const list = document.getElementById('sessionList');
    const empty = document.getElementById('emptyWrap');
    list.querySelectorAll('.session-item').forEach(e => e.remove());

    let items = sessions;
    if (filter) {
      const q = filter.toLowerCase();
      items = sessions.filter(s => (s.name||'').toLowerCase().includes(q) || (s.transcript||'').toLowerCase().includes(q));
    }

    if (items.length === 0) { empty.style.display = 'flex'; return; }
    empty.style.display = 'none';

    items.forEach((s) => {
      const idx = sessions.indexOf(s);
      const el = document.createElement('div');
      el.className = 'session-item';
      el.onclick = () => openDetail(idx);
      const meta = [formatDate(s.date, s.time), s.duration].filter(Boolean).join('  ·  ');
      el.innerHTML = `
        <div class="session-item-name">${escHtml(s.name || 'New Recording')}</div>
        <div class="session-item-meta">${meta}</div>
      `;
      list.appendChild(el);
    });
  }

  // Recording
  async function toggleRec() {
    if (!isRec) await startRec();
    else await stopRec();
  }

  async function startRec() {
    try {
      recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e) {
      alert('Microphone access required. Please allow microphone and try again.');
      return;
    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    audioCtx.createMediaStreamSource(recStream).connect(analyser);

    audioChunks = [];
    liveTranscript = '';
    waveData = [];

    const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    mediaRec = new MediaRecorder(recStream, { mimeType: mime });
    mediaRec.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunks.push(e.data); };
    mediaRec.start(100);

    startRecognition();

    recSecs = 0;
    updateTimer();
    recInterval = setInterval(updateTimer, 1000);

    isRec = true;
    isPaused = false;

    document.getElementById('recMainBtn').classList.add('recording');
    document.getElementById('deleteBtn').classList.remove('invisible');
    document.getElementById('pauseBtn').classList.remove('invisible');
    document.getElementById('recTitle').textContent = formatRecName(new Date());
    document.getElementById('recTranscribing').classList.remove('show');
  }

  async function stopRec() {
    clearInterval(recInterval);
    isRec = false;
    isPaused = false;

    if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
    cancelAnimationFrame(waveAF); waveAF = null;

    if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
    if (recStream) recStream.getTracks().forEach(t => t.stop());
    if (audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; analyser = null; }

    document.getElementById('recMainBtn').classList.remove('recording');
    document.getElementById('deleteBtn').classList.add('invisible');
    document.getElementById('pauseBtn').classList.add('invisible');
    document.getElementById('recTranscribing').classList.add('show');
    document.getElementById('recTimer').innerHTML = '&nbsp;';

    await new Promise(r => mediaRec ? (mediaRec.onstop = r) : r());

    const now = new Date();
    const entry = {
      id: Date.now(),
      name: formatRecName(now),
      date: now.toISOString().split('T')[0],
      time: now.toTimeString().slice(0,5),
      duration: formatDur(recSecs),
      transcript: liveTranscript.trim()
    };
    sessions.unshift(entry);
    saveSessions();
    renderList();

    document.getElementById('recTranscribing').classList.remove('show');
    document.getElementById('recTitle').textContent = 'New Recording';
    document.getElementById('recTimer').innerHTML = '&nbsp;';
    waveData = [];
    recSecs = 0;
    drawWave();
  }

  function togglePause() {
    if (!isRec) return;
    const icon = document.getElementById('pauseIcon');
    if (!isPaused) {
      if (mediaRec && mediaRec.state === 'recording') mediaRec.pause();
      if (recognition) { try { recognition.stop(); } catch(e) {} }
      clearInterval(recInterval);
      isPaused = true;
      icon.innerHTML = '<polygon points="5,3 19,12 5,21" fill="#fff"/>';
    } else {
      if (mediaRec && mediaRec.state === 'paused') mediaRec.resume();
      startRecognition();
      recInterval = setInterval(updateTimer, 1000);
      isPaused = false;
      icon.innerHTML = '<rect x="6" y="5" width="4" height="14" rx="1.5" fill="#fff"/><rect x="14" y="5" width="4" height="14" rx="1.5" fill="#fff"/>';
    }
  }

  function cancelRec() {
    clearInterval(recInterval);
    isRec = false; isPaused = false;
    if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
    cancelAnimationFrame(waveAF); waveAF = null;
    if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
    if (recStream) recStream.getTracks().forEach(t => t.stop());
    if (audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; analyser = null; }

    document.getElementById('recMainBtn').classList.remove('recording');
    document.getElementById('deleteBtn').classList.add('invisible');
    document.getElementById('pauseBtn').classList.add('invisible');
    document.getElementById('recTitle').textContent = 'New Recording';
    document.getElementById('recTimer').innerHTML = '&nbsp;';
    document.getElementById('pauseIcon').innerHTML = '<rect x="6" y="5" width="4" height="14" rx="1.5" fill="#fff"/><rect x="14" y="5" width="4" height="14" rx="1.5" fill="#fff"/>';
    waveData = [];
    recSecs = 0;
    drawWave();
  }

  // Speech recognition
  function startRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
    const base = liveTranscript;
    let added = '';
    recognition.onresult = e => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) added += e.results[i][0].transcript + ' ';
      }
      liveTranscript = base + added;
    };
    recognition.onerror = () => {};
    recognition.onend = () => { if (isRec && !isPaused) { try { recognition.start(); } catch(e) {} } };
    try { recognition.start(); } catch(e) {}
  }

  // Waveform - scrolling like Voice Memo
  function drawWave() {
    const c = document.getElementById('recWave');
    if (!c) return;
    const ctx = c.getContext('2d');
    const W = c.width || c.offsetWidth;
    const H = 60;
    ctx.clearRect(0, 0, W, H);
    const cy = H / 2;

    if (analyser && isRec && !isPaused) {
      // Sample current level
      const buf = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(buf);
      let sum = 0;
      for (let i = 0; i < buf.length * 0.6; i++) sum += buf[i];
      const level = sum / (buf.length * 0.6 * 255);
      waveData.push(level);

      // Draw scrolling bars - newest on right half, grows leftward
      const bw = 3;
      const gap = 2;
      const step = bw + gap;
      const maxBars = Math.floor(W / step);

      // Only keep what fits
      if (waveData.length > maxBars) waveData = waveData.slice(-maxBars);

      const startX = W / 2 - (waveData.length - 1) * step;

      waveData.forEach((v, i) => {
        const x = startX + i * step;
        const h = Math.max(3, v * H * 0.88);
        const y = cy - h / 2;
        // Rightmost bars brighter
        const distFromRight = waveData.length - 1 - i;
        const alpha = Math.max(0.25, 1 - distFromRight * 0.04);
        ctx.fillStyle = `rgba(255,59,48,${alpha})`;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(x, y, bw, h, 1.5);
        else ctx.rect(x, y, bw, h);
        ctx.fill();
      });

      // Right side - dotted future
      const rightStart = W / 2 + 8;
      let rx = rightStart;
      while (rx < W) {
        ctx.beginPath();
        ctx.arc(rx, cy, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,59,48,0.25)';
        ctx.fill();
        rx += 8;
      }

    } else {
      // Idle - centered dotted line
      let x = 0;
      while (x < W) {
        const dist = Math.abs(x - W / 2);
        const alpha = Math.max(0.06, 0.5 - dist / W);
        ctx.beginPath();
        ctx.arc(x, cy, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,59,48,${alpha})`;
        ctx.fill();
        x += 8;
      }
    }

    waveAF = requestAnimationFrame(drawWave);
  }

  // Timer
  function updateTimer() {
    recSecs++;
    const m = Math.floor(recSecs / 60);
    const s = recSecs % 60;
    document.getElementById('recTimer').textContent = pad(m) + ':' + pad(s);
  }

  // Detail
  function openDetail(idx) {
    currentIdx = idx;
    const s = sessions[idx];
    document.getElementById('detailName').value = s.name || 'New Recording';
    document.getElementById('detailMeta').textContent = formatDetailMeta(s);
    const tt = document.getElementById('detailTranscript');
    if (s.transcript && s.transcript.trim()) {
      tt.className = 'detail-transcript';
      tt.textContent = s.transcript;
    } else {
      tt.className = 'detail-no-transcript';
      tt.textContent = 'No transcript available';
    }
    document.getElementById('detailScreen').classList.add('open');
  }

  function closeDetail() {
    if (currentIdx >= 0) {
      const n = document.getElementById('detailName').value.trim();
      if (n) { sessions[currentIdx].name = n; saveSessions(); renderList(); }
    }
    document.getElementById('detailScreen').classList.remove('open');
    currentIdx = -1;
  }

  function deleteSession() {
    if (currentIdx < 0) return;
    if (!confirm('Delete this recording?')) return;
    sessions.splice(currentIdx, 1);
    saveSessions();
    renderList();
    document.getElementById('detailScreen').classList.remove('open');
    currentIdx = -1;
  }

  function shareSession() {
    if (currentIdx < 0) return;
    const s = sessions[currentIdx];
    const text = (s.name || '') + '\n' + formatDetailMeta(s) + '\n\n' + (s.transcript || '');
    if (navigator.share) navigator.share({ title: s.name, text });
    else navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard'));
  }

  // Search
  function toggleSearch() {
    const wrap = document.getElementById('searchWrap');
    const input = document.getElementById('searchInput');
    const hidden = wrap.classList.contains('hidden');
    wrap.classList.toggle('hidden');
    if (hidden) { input.focus(); }
    else { input.value = ''; renderList(); }
  }

  function filterSessions() {
    renderList(document.getElementById('searchInput').value);
  }

  function showOptions() {
    alert('Options coming soon');
  }

  // Utils
  function pad(n) { return String(n).padStart(2,'0'); }

  function formatRecName(d) {
    return d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}) + ' at ' +
      d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  }

  function formatDate(dateStr, timeStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T12:00:00');
    const today = new Date().toISOString().split('T')[0];
    const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0];
    let label = dateStr === today ? 'Today' : dateStr === yesterday ? 'Yesterday' :
      d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    return label + (timeStr ? ' ' + timeStr : '');
  }

  function formatDetailMeta(s) {
    const d = s.date ? new Date(s.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}) : '';
    return [d, s.time, s.duration].filter(Boolean).join(' · ');
  }

  function formatDur(secs) {
    const m = Math.floor(secs/60), s = secs%60;
    return m + ':' + pad(s);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

</body>
</html>
