<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#000;color:#fff;font-family:-apple-system,'SF Pro Display','Inter',sans-serif;overflow:hidden;}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.screen.active{opacity:1;pointer-events:all;}

/* LOGIN */
#loginScreen{align-items:center;justify-content:center;padding:32px;}
.login-box{width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;gap:32px;text-align:center;}
.login-logo{display:flex;align-items:center;gap:8px;}
.hex{width:12px;height:12px;background:#F6692A;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);}
.hex-o{width:12px;height:12px;border:1.5px solid #F6692A;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);}
.login-brand{font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;}
.login-title{font-size:28px;font-weight:700;letter-spacing:-0.02em;}
.login-sub{font-size:14px;color:#666;line-height:1.6;}
.google-btn{width:100%;padding:15px;background:#fff;color:#111;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity 0.15s;}
.google-btn:active{opacity:0.8;}

/* MAIN APP */
#mainScreen{flex-direction:column;background:#000;}

/* Header */
.app-header{padding:56px 20px 12px;display:flex;align-items:flex-end;justify-content:space-between;}
.app-title{font-size:34px;font-weight:700;letter-spacing:-0.02em;}
.header-actions{display:flex;gap:12px;padding-bottom:4px;}
.icon-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Session list */
.session-list{flex:1;overflow-y:auto;padding:0 0 200px;}
.session-list::-webkit-scrollbar{display:none;}
.session-item{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:background 0.15s;}
.session-item:active{background:rgba(255,255,255,0.05);}
.session-date{font-size:16px;font-weight:500;margin-bottom:3px;}
.session-meta{font-size:13px;color:#666;display:flex;align-items:center;gap:8px;}
.session-duration{margin-left:auto;font-size:13px;color:#666;}
.session-transcript{font-size:13px;color:#999;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:#444;font-size:14px;gap:8px;}

/* Recording panel - slides up from bottom */
.rec-panel{position:fixed;bottom:0;left:0;right:0;background:#1C1C1E;border-radius:20px 20px 0 0;padding:12px 20px 40px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);}
.rec-panel.open{transform:translateY(0);}
.rec-handle{width:36px;height:4px;background:#3A3A3C;border-radius:2px;margin:0 auto 16px;}
.rec-location{font-size:17px;font-weight:600;text-align:center;margin-bottom:4px;}
.rec-timer{font-size:14px;color:#8E8E93;text-align:center;margin-bottom:20px;}
.rec-wave{width:100%;height:48px;margin-bottom:24px;}
.rec-controls{display:flex;align-items:center;justify-content:center;gap:32px;}
.rec-btn-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
.rec-btn-label{font-size:11px;color:#8E8E93;}

/* Big record button */
.rec-btn{width:72px;height:72px;border-radius:50%;background:transparent;border:3px solid #fff;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:all 0.2s;}
.rec-btn-inner{width:52px;height:52px;border-radius:50%;background:#FF3B30;transition:all 0.25s;}
.rec-btn.recording .rec-btn-inner{border-radius:10px;width:28px;height:28px;}

/* Side buttons */
.side-btn{width:48px;height:48px;border-radius:50%;background:#2C2C2E;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Transcribing indicator */
.transcribe-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(255,149,0,0.15);border-radius:100px;font-size:11px;font-weight:600;color:#FF9500;letter-spacing:0.04em;}
.transcribe-dot{width:6px;height:6px;border-radius:50%;background:#FF9500;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Session detail panel */
.detail-panel{position:fixed;inset:0;background:#000;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);overflow-y:auto;z-index:10;}
.detail-panel.open{transform:translateX(0);}
.detail-header{padding:56px 20px 16px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(255,255,255,0.08);}
.back-btn{background:none;border:none;color:#F6692A;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:4px;padding:0;}
.detail-title{font-size:17px;font-weight:600;}
.detail-body{padding:20px;}
.detail-section{margin-bottom:24px;}
.detail-label{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#666;margin-bottom:8px;}
.detail-text{font-size:15px;line-height:1.6;color:#e0e0e0;}
.detail-meta{font-size:13px;color:#666;margin-bottom:4px;}
</style>

</head>

<script>
  // CONFIG
  const SB_URL = 'https://zpaowjtjyvfjkbpjogqi.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpwYW93anRqeXZmamticGpvZ3FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Njc1MDksImV4cCI6MjA5MTI0MzUwOX0.15xalsWwm1IFqDJJU2MntKvoOiWRr7YBLkwKDpm5_sI';
  const ANTHROPIC_KEY = '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';

  const sb = supabase.createClient(SB_URL, SB_KEY);
  let currentUser = null;
  let sessions = [];

  // Recording state
  let mediaRec = null;
  let audioChunks = [];
  let recStream = null;
  let recTimer = null;
  let recSecs = 0;
  let isRecording = false;
  let isPaused = false;
  let audioCtx = null;
  let analyser = null;
  let waveAF = null;

  // Speech recognition
  let recognition = null;
  let transcript = '';

  const $ = id => document.getElementById(id);

  // AUTH - skip login, local storage only
  async function init() {
    show('mainScreen');
    openRecPanel();
    await loadSessions();
  }

  async function signInWithGoogle() {}

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
  }

  // RECORDING PANEL
  function openRecPanel() {
    setTimeout(() => $('recPanel').classList.add('open'), 100);
  }

  // RECORDING
  async function toggleRecording() {
    if (!isRecording) {
      await startRecording();
    } else {
      await stopRecording();
    }
  }

  async function startRecording() {
    try {
      recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      alert('Microphone access needed. Please allow microphone and try again.');
      return;
    }

    // Audio visualizer
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    audioCtx.createMediaStreamSource(recStream).connect(analyser);
    drawWave();

    // MediaRecorder
    audioChunks = [];
    transcript = '';
    mediaRec = new MediaRecorder(recStream);
    mediaRec.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRec.start(100);

    // Speech recognition
    startSpeechRecognition();

    // Timer
    recSecs = 0;
    updateTimer();
    recTimer = setInterval(updateTimer, 1000);

    // UI
    isRecording = true;
    $('recBtn').classList.add('recording');
    $('recBtnLbl').textContent = 'Stop';
    $('deleteBtn').style.opacity = '1';
    $('deleteBtn').style.pointerEvents = 'auto';
    $('deleteLbl').style.opacity = '1';
    $('pauseBtn').style.opacity = '1';
    $('pauseBtn').style.pointerEvents = 'auto';
    $('pauseLbl').style.opacity = '1';
    $('recLocation').textContent = formatDateTime(new Date());

  }

  async function stopRecording() {
    if (!mediaRec) return;

    // Stop everything
    clearInterval(recTimer);
    isRecording = false;
    isPaused = false;

    if (recognition) try { recognition.stop(); } catch(e) {}
    cancelAnimationFrame(waveAF);

    mediaRec.stop();
    recStream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close();

    // Clear wave
    const wc = $('recWave');
    const wctx = wc.getContext('2d');
    wctx.clearRect(0, 0, wc.width, wc.height);

    // UI - show transcribing state
    $('recBtn').classList.remove('recording');
    $('recBtnLbl').textContent = 'Record';
    $('deleteBtn').style.opacity = '0';
    $('deleteBtn').style.pointerEvents = 'none';
    $('deleteLbl').style.opacity = '0';
    $('pauseBtn').style.opacity = '0';
    $('pauseBtn').style.pointerEvents = 'none';
    $('pauseLbl').style.opacity = '0';
    $('recLocation').innerHTML = '<span class="transcribe-badge"><span class="transcribe-dot"></span>Transcribing</span>';

    // Wait for mediaRec to finish then save
    await new Promise(resolve => { mediaRec.onstop = resolve; });
    await saveSession();

    $('recLocation').textContent = 'New Recording';
    $('recTimer').textContent = '00:00';
    recSecs = 0;
  }

  function pauseRecording() {
    if (!isRecording) return;
    if (!isPaused) {
      mediaRec.pause();
      if (recognition) recognition.stop();
      clearInterval(recTimer);
      isPaused = true;
      $('pauseBtn').innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="#fff"/></svg>';
      $('pauseLbl').textContent = 'Resume';
    } else {
      mediaRec.resume();
      startSpeechRecognition();
      recTimer = setInterval(updateTimer, 1000);
      isPaused = false;
      $('pauseBtn').innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="6" y="5" width="4" height="14" rx="1" fill="#fff"/><rect x="14" y="5" width="4" height="14" rx="1" fill="#fff"/></svg>';
      $('pauseLbl').textContent = 'Pause';
    }
  }

  function cancelRecording() {
    if (!isRecording && !isPaused) return;
    clearInterval(recTimer);
    if (recognition) try { recognition.stop(); } catch(e) {}
    cancelAnimationFrame(waveAF);
    if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
    if (recStream) recStream.getTracks().forEach(t => t.stop());
    if (audioCtx) try { audioCtx.close(); } catch(e) {}

    isRecording = false;
    isPaused = false;
    $('recBtn').classList.remove('recording');
    $('recBtnLbl').textContent = 'Record';
    $('deleteBtn').style.opacity = '0';
    $('deleteBtn').style.pointerEvents = 'none';
    $('deleteLbl').style.opacity = '0';
    $('pauseBtn').style.opacity = '0';
    $('pauseBtn').style.pointerEvents = 'none';
    $('pauseLbl').style.opacity = '0';
    $('recLocation').textContent = 'New Recording';
    $('recTimer').textContent = '00:00';
    recSecs = 0;

    const wc = $('recWave');
    const wctx = wc.getContext('2d');
    wctx.clearRect(0, 0, wc.width, wc.height);
  }

  // SPEECH RECOGNITION
  function startSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    let finalTranscript = transcript;
    recognition.onresult = e => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      transcript = finalTranscript;
    };
    recognition.onerror = () => {};
    recognition.onend = () => {
      if (isRecording && !isPaused) {
        try { recognition.start(); } catch(e) {}
      }
    };
    try { recognition.start(); } catch(e) {}
  }

  // WAVEFORM
  function drawWave() {
    const wc = $('recWave');
    if (!wc) return;
    wc.width = wc.offsetWidth;
    const wctx = wc.getContext('2d');
    const W = wc.width, H = 48;

    wctx.clearRect(0, 0, W, H);

    if (analyser && isRecording && !isPaused) {
      const buf = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(buf);
      const bars = 40;
      const bw = Math.floor(W / bars) - 2;
      for (let i = 0; i < bars; i++) {
        const idx = Math.floor(i / bars * buf.length * 0.7);
        const h = Math.max(3, (buf[idx] / 255) * H * 0.9);
        const x = i * (bw + 2) + 1;
        const y = (H - h) / 2;
        wctx.fillStyle = '#FF3B30';
        wctx.beginPath();
        wctx.roundRect(x, y, bw, h, 2);
        wctx.fill();
      }
    } else {
      // Flat line when not recording
      wctx.strokeStyle = 'rgba(255,255,255,0.15)';
      wctx.lineWidth = 1;
      wctx.beginPath();
      wctx.moveTo(0, H / 2);
      wctx.lineTo(W, H / 2);
      wctx.stroke();
    }

    waveAF = requestAnimationFrame(drawWave);
  }

  // TIMER
  function updateTimer() {
    recSecs++;
    const m = String(Math.floor(recSecs / 60)).padStart(2, '0');
    const s = String(recSecs % 60).padStart(2, '0');
    $('recTimer').textContent = `${m}:${s}`;
  }

  // SAVE SESSION
  async function saveSession() {
    const now = new Date();
    const date = now.toISOString().split('T')[0];
    const time = now.toTimeString().split(' ')[0].slice(0, 5);
    const duration = formatDuration(recSecs);

    const entry = {
      id: Date.now(),
      date,
      time,
      duration,
      transcript: transcript.trim() || ''
    };

    sessions.unshift(entry);
    localStorage.setItem('rt_sessions', JSON.stringify(sessions));
    renderSessions();
  }

  // LOAD SESSIONS from localStorage
  async function loadSessions() {
    const stored = localStorage.getItem('rt_sessions');
    sessions = stored ? JSON.parse(stored) : [];
    renderSessions();
  }

  function renderSessions() {
    const list = $('sessionList');
    const empty = $('emptyState');

    if (sessions.length === 0) {
      empty.style.display = 'flex';
      // Remove existing items
      list.querySelectorAll('.session-item').forEach(i => i.remove());
      return;
    }

    empty.style.display = 'none';
    list.querySelectorAll('.session-item').forEach(i => i.remove());

    sessions.forEach((s, i) => {
      const item = document.createElement('div');
      item.className = 'session-item';
      item.onclick = () => openDetail(i);

      const dateLabel = formatDateLabel(s.date, s.time);
      const hasTranscript = s.transcript && s.transcript.trim().length > 0;

      item.innerHTML = `
        <div style="display:flex;align-items:flex-start;justify-content:space-between;">
          <div style="flex:1;">
            <div class="session-date">${dateLabel}</div>
            <div class="session-meta">
              <span>${s.time || ''}</span>
              ${s.activity_type ? `<span style="color:#F6692A;">${s.activity_type}</span>` : ''}
            </div>
            ${hasTranscript ? `<div class="session-transcript">${s.transcript}</div>` : ''}
          </div>
          <div class="session-duration">${s.duration || ''}</div>
        </div>
      `;
      list.appendChild(item);
    });
  }

  // SESSION DETAIL
  function openDetail(index) {
    const s = sessions[index];
    $('detailTitle').textContent = formatDateLabel(s.date, s.time);
    $('detailMeta').textContent = `${s.date} at ${s.time || ''} · ${s.duration || ''}`;
    $('detailTranscript').textContent = s.transcript || 'No transcript';
    $('detailPanel').classList.add('open');
  }

  function closeDetail() {
    $('detailPanel').classList.remove('open');
  }

  // PROFILE
  function showProfile() {
    alert('Profile coming soon.');
  }

  // UTILS
  function formatDuration(secs) {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    if (m === 0) return `0:${String(s).padStart(2,'0')}`;
    return `${m}:${String(s).padStart(2,'0')}`;
  }

  function formatDateTime(date) {
    return date.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
  }

  function formatDateLabel(dateStr, timeStr) {
    if (!dateStr) return 'Recording';
    const date = new Date(dateStr + 'T' + (timeStr || '00:00') + ':00');
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const yesterday = new Date(now - 86400000).toISOString().split('T')[0];
    if (dateStr === today) return 'Today';
    if (dateStr === yesterday) return 'Yesterday';
    return date.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
  }

  // Start wave animation on load
  window.addEventListener('load', () => {
    drawWave();
    init();
  });
</script>

</body>
