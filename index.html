<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Real Tracking">
<meta name="theme-color" content="#000000">
<title>Real Tracking</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;overflow:hidden;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.screen.active{opacity:1;pointer-events:all;}

/* MAIN */
#mainScreen{flex-direction:column;background:#000;}

/* Header - matches Voice Memo exactly */
.app-header{
padding:60px 16px 8px;
display:flex;
align-items:flex-end;
justify-content:space-between;
}
.app-title{font-size:34px;font-weight:700;letter-spacing:-0.4px;line-height:1.1;}
.header-right{display:flex;align-items:center;gap:8px;padding-bottom:6px;}
.hdr-btn{
background:none;border:none;color:#FF3B30;
font-size:16px;font-weight:400;cursor:pointer;padding:4px 2px;
}
.hdr-icon-btn{
width:30px;height:30px;border-radius:50%;
background:rgba(255,255,255,0.12);border:none;
color:#fff;cursor:pointer;
display:flex;align-items:center;justify-content:center;
}

/* Search bar */
.search-bar{
margin:8px 16px 4px;
background:#1C1C1E;
border-radius:10px;
padding:8px 12px;
display:flex;align-items:center;gap:8px;
color:#8E8E93;font-size:17px;
}
.search-bar input{
background:none;border:none;outline:none;
color:#fff;font-size:17px;flex:1;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.search-bar input::placeholder{color:#8E8E93;}

/* List */
.session-list{flex:1;overflow-y:auto;padding-bottom:220px;}
.session-list::-webkit-scrollbar{display:none;}

.list-section-header{
padding:6px 16px 2px;
font-size:13px;font-weight:600;
color:#8E8E93;letter-spacing:0.02em;
text-transform:uppercase;
}

.session-item{
padding:12px 16px;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
display:flex;align-items:center;gap:12px;
transition:background 0.1s;
position:relative;
}
.session-item:active{background:rgba(255,255,255,0.05);}
.session-item-body{flex:1;min-width:0;}
.session-item-title{
font-size:17px;font-weight:400;
color:#fff;margin-bottom:2px;
white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.session-item-sub{
font-size:13px;color:#8E8E93;
display:flex;align-items:center;gap:6px;
white-space:nowrap;overflow:hidden;
}
.session-item-transcript{
font-size:13px;color:#8E8E93;
margin-top:1px;
display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;
overflow:hidden;
}
.session-item-dur{font-size:13px;color:#8E8E93;flex-shrink:0;}
.chevron{
color:#3A3A3C;flex-shrink:0;
}

/* Empty */
.empty-state{
display:flex;flex-direction:column;align-items:center;
justify-content:center;height:50vh;
color:#3A3A3C;gap:12px;
}
.empty-state svg{opacity:0.4;}
.empty-state-text{font-size:15px;color:#3A3A3C;}

/* RECORDING PANEL - bottom sheet */
.rec-panel{
position:fixed;bottom:0;left:0;right:0;
background:#1C1C1E;
border-radius:13px 13px 0 0;
padding:8px 0 0;
transform:translateY(100%);
transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);
z-index:100;
}
.rec-panel.open{transform:translateY(0);}

.rec-handle{
width:36px;height:5px;background:#48484A;
border-radius:3px;margin:0 auto 12px;
}

.rec-name{
font-size:17px;font-weight:600;
text-align:center;color:#fff;
padding:0 20px;
margin-bottom:2px;
min-height:24px;
}

.rec-time{
font-size:13px;color:#8E8E93;
text-align:center;margin-bottom:16px;
min-height:18px;
}

/* Waveform - dotted at rest like Voice Memo */
.rec-wave-wrap{
padding:0 20px;margin-bottom:20px;
height:52px;display:flex;align-items:center;
}
#recWave{width:100%;height:52px;display:block;}

/* Controls row */
.rec-controls{
display:flex;align-items:center;
justify-content:space-between;
padding:0 40px 48px;
}

/* Side button - ellipsis / list */
.side-btn{
width:56px;height:56px;border-radius:50%;
background:#2C2C2E;border:none;
color:#fff;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:opacity 0.2s;
}
.side-btn.hidden{opacity:0;pointer-events:none;}

/* Main record button - Voice Memo style */
.rec-btn-outer{
width:80px;height:80px;border-radius:50%;
background:#2C2C2E;
display:flex;align-items:center;justify-content:center;
cursor:pointer;border:none;
transition:all 0.2s;
flex-shrink:0;
}
.rec-btn-inner{
width:56px;height:56px;border-radius:50%;
background:#FF3B30;
transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.rec-btn-outer.recording .rec-btn-inner{
border-radius:8px;
width:28px;height:28px;
}

/* Transcribing */
.rec-transcribing{
display:none;align-items:center;justify-content:center;
gap:6px;padding:4px 0 8px;
font-size:12px;color:#FF9500;font-weight:500;
}
.rec-transcribing.show{display:flex;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.t-dot{width:5px;height:5px;border-radius:50%;background:#FF9500;animation:blink 1.2s infinite;}

/* DETAIL - slides in from right */
.detail-screen{
position:fixed;inset:0;background:#000;
transform:translateX(100%);
transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);
z-index:200;
display:flex;flex-direction:column;
}
.detail-screen.open{transform:translateX(0);}

.detail-nav{
padding:56px 16px 12px;
display:flex;align-items:center;
border-bottom:1px solid rgba(255,255,255,0.1);
}
.detail-back{
background:none;border:none;
color:#FF3B30;font-size:17px;
cursor:pointer;display:flex;align-items:center;gap:4px;
padding:0;margin-right:auto;
}
.detail-actions{display:flex;gap:16px;}
.detail-action-btn{
background:none;border:none;
color:#FF3B30;cursor:pointer;padding:4px;
}

.detail-body{flex:1;overflow-y:auto;padding:20px 16px;}
.detail-title-edit{
font-size:22px;font-weight:700;color:#fff;
background:none;border:none;outline:none;
width:100%;margin-bottom:4px;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
.detail-meta-row{font-size:13px;color:#8E8E93;margin-bottom:20px;}
.detail-transcript-label{
font-size:11px;font-weight:600;letter-spacing:0.06em;
text-transform:uppercase;color:#8E8E93;margin-bottom:8px;
}
.detail-transcript-text{
font-size:16px;line-height:1.6;color:#fff;
white-space:pre-wrap;
}
.detail-no-transcript{font-size:15px;color:#3A3A3C;font-style:italic;}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>

</head>

<script>
  let sessions = [];
  let currentDetailIndex = -1;
  let isRecording = false;
  let isPaused = false;
  let mediaRec = null;
  let audioChunks = [];
  let recStream = null;
  let recTimerInterval = null;
  let recSecs = 0;
  let audioCtx = null;
  let analyser = null;
  let waveAF = null;
  let recognition = null;
  let transcript = '';
  let searchVisible = false;

  // Init
  window.addEventListener('load', () => {
    loadSessions();
    setTimeout(() => {
      document.getElementById('recPanel').classList.add('open');
    }, 200);
    resizeWave();
    drawWave();
    window.addEventListener('resize', resizeWave);
  });

  function resizeWave() {
    const wc = document.getElementById('recWave');
    wc.width = wc.offsetWidth;
  }

  // SESSIONS
  function loadSessions() {
    const stored = localStorage.getItem('rt_sessions_v2');
    sessions = stored ? JSON.parse(stored) : [];
    renderList();
  }

  function saveSessions() {
    localStorage.setItem('rt_sessions_v2', JSON.stringify(sessions));
  }

  function renderList(filter) {
    const list = document.getElementById('sessionList');
    const empty = document.getElementById('emptyState');
    list.querySelectorAll('.session-item,.list-section-header').forEach(e => e.remove());

    let items = sessions;
    if (filter) {
      const q = filter.toLowerCase();
      items = sessions.filter(s =>
        (s.name||'').toLowerCase().includes(q) ||
        (s.transcript||'').toLowerCase().includes(q)
      );
    }

    if (items.length === 0) {
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';

    // Group by date
    let lastDate = null;
    items.forEach((s, i) => {
      const dateLabel = formatDateGroup(s.date);
      if (dateLabel !== lastDate) {
        const hdr = document.createElement('div');
        hdr.className = 'list-section-header';
        hdr.textContent = dateLabel;
        list.appendChild(hdr);
        lastDate = dateLabel;
      }

      const idx = sessions.indexOf(s);
      const item = document.createElement('div');
      item.className = 'session-item';
      item.onclick = () => openDetail(idx);

      const hasTranscript = s.transcript && s.transcript.trim().length > 0;

      item.innerHTML = `
        <div class="session-item-body">
          <div class="session-item-title">${s.name || 'New Recording'}</div>
          <div class="session-item-sub">
            <span>${s.time || ''}</span>
            ${hasTranscript ? '<span style="color:#3A3A3C;">|</span><span style="overflow:hidden;text-overflow:ellipsis;">' + escHtml(s.transcript.slice(0, 60)) + '</span>' : ''}
          </div>
        </div>
        <div class="session-item-dur">${s.duration || ''}</div>
        <svg class="chevron" width="8" height="13" viewBox="0 0 8 14" fill="none">
          <path d="M1 1l6 6-6 6" stroke="#3A3A3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      `;
      list.appendChild(item);
    });
  }

  // RECORDING
  async function toggleRecording() {
    if (!isRecording) {
      await startRec();
    } else {
      await stopRec();
    }
  }

  async function startRec() {
    try {
      recStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch(e) {
      alert('Microphone access is required. Please allow microphone in your browser settings and try again.');
      return;
    }

    // Analyser
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    audioCtx.createMediaStreamSource(recStream).connect(analyser);

    // MediaRecorder
    audioChunks = [];
    transcript = '';
    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    mediaRec = new MediaRecorder(recStream, { mimeType });
    mediaRec.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunks.push(e.data); };
    mediaRec.start(200);

    // Speech recognition
    startRecognition();

    // Timer
    recSecs = 0;
    updateTimer();
    recTimerInterval = setInterval(updateTimer, 1000);

    // UI
    isRecording = true;
    isPaused = false;
    document.getElementById('recBtn').classList.add('recording');
    document.getElementById('deleteBtn').classList.remove('hidden');
    document.getElementById('pauseBtn').classList.remove('hidden');
    document.getElementById('recName').textContent = formatRecName(new Date());
    document.getElementById('recTranscribing').classList.remove('show');
  }

  async function stopRec() {
    clearInterval(recTimerInterval);
    isRecording = false;
    isPaused = false;

    if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
    cancelAnimationFrame(waveAF);
    waveAF = null;

    if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
    if (recStream) recStream.getTracks().forEach(t => t.stop());
    if (audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; analyser = null; }

    // UI
    document.getElementById('recBtn').classList.remove('recording');
    document.getElementById('deleteBtn').classList.add('hidden');
    document.getElementById('pauseBtn').classList.add('hidden');
    document.getElementById('recTranscribing').classList.add('show');
    document.getElementById('recTime').innerHTML = '&nbsp;';

    // Wait for mediaRec to finish
    await new Promise(r => { if (mediaRec) mediaRec.onstop = r; else r(); });

    // Save
    const now = new Date();
    const entry = {
      id: Date.now(),
      name: formatRecName(now),
      date: now.toISOString().split('T')[0],
      time: now.toTimeString().slice(0,5),
      duration: formatDur(recSecs),
      transcript: transcript.trim()
    };
    sessions.unshift(entry);
    saveSessions();
    renderList();

    // Reset panel
    document.getElementById('recTranscribing').classList.remove('show');
    document.getElementById('recName').textContent = 'New Recording';
    document.getElementById('recTime').innerHTML = '&nbsp;';
    recSecs = 0;

    // Restart wave animation
    drawWave();
  }

  function pauseRecording() {
    if (!isRecording) return;
    const icon = document.getElementById('pauseIcon');
    if (!isPaused) {
      if (mediaRec && mediaRec.state === 'recording') mediaRec.pause();
      if (recognition) { try { recognition.stop(); } catch(e) {} }
      clearInterval(recTimerInterval);
      isPaused = true;
      icon.innerHTML = '<polygon points="5,3 19,12 5,21" fill="#fff"/>';
    } else {
      if (mediaRec && mediaRec.state === 'paused') mediaRec.resume();
      startRecognition();
      recTimerInterval = setInterval(updateTimer, 1000);
      isPaused = false;
      icon.innerHTML = '<rect x="6" y="5" width="4" height="14" rx="1.5" fill="#fff"/><rect x="14" y="5" width="4" height="14" rx="1.5" fill="#fff"/>';
    }
  }

  function cancelRecording() {
    if (!isRecording && !isPaused) return;
    clearInterval(recTimerInterval);
    isRecording = false; isPaused = false;
    if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
    cancelAnimationFrame(waveAF); waveAF = null;
    if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
    if (recStream) recStream.getTracks().forEach(t => t.stop());
    if (audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; analyser = null; }

    document.getElementById('recBtn').classList.remove('recording');
    document.getElementById('deleteBtn').classList.add('hidden');
    document.getElementById('pauseBtn').classList.add('hidden');
    document.getElementById('recName').textContent = 'New Recording';
    document.getElementById('recTime').innerHTML = '&nbsp;';
    document.getElementById('pauseIcon').innerHTML = '<rect x="6" y="5" width="4" height="14" rx="1.5" fill="#fff"/><rect x="14" y="5" width="4" height="14" rx="1.5" fill="#fff"/>';
    recSecs = 0;
    drawWave();
  }

  // SPEECH RECOGNITION
  function startRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
    let base = transcript;
    recognition.onresult = e => {
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) base += e.results[i][0].transcript + ' ';
      }
      transcript = base;
    };
    recognition.onerror = () => {};
    recognition.onend = () => {
      if (isRecording && !isPaused) {
        try { recognition.start(); } catch(e) {}
      }
    };
    try { recognition.start(); } catch(e) {}
  }

  // WAVEFORM
  function drawWave() {
    const wc = document.getElementById('recWave');
    if (!wc) return;
    const wctx = wc.getContext('2d');
    const W = wc.width || wc.offsetWidth;
    const H = 52;
    wctx.clearRect(0, 0, W, H);

    if (analyser && isRecording && !isPaused) {
      // Active recording - red bars
      const buf = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(buf);
      const bars = 50;
      const bw = 3;
      const gap = (W - bars * bw) / (bars - 1);
      for (let i = 0; i < bars; i++) {
        const idx = Math.floor(i / bars * buf.length * 0.6);
        const h = Math.max(3, (buf[idx] / 255) * H * 0.92);
        const x = i * (bw + gap);
        const y = (H - h) / 2;
        wctx.fillStyle = '#FF3B30';
        wctx.beginPath();
        if (wctx.roundRect) wctx.roundRect(x, y, bw, h, 1.5);
        else wctx.rect(x, y, bw, h);
        wctx.fill();
      }
    } else {
      // Idle - dotted line like Voice Memo
      const dotR = 1.5;
      const spacing = 8;
      const cx = W / 2;
      const cy = H / 2;
      let x = 0;
      while (x < W) {
        const dist = Math.abs(x - cx);
        const fade = Math.max(0.08, 1 - dist / (W * 0.55));
        wctx.beginPath();
        wctx.arc(x, cy, dotR, 0, Math.PI * 2);
        wctx.fillStyle = `rgba(255,59,48,${fade * 0.6})`;
        wctx.fill();
        x += spacing;
      }
    }

    waveAF = requestAnimationFrame(drawWave);
  }

  // TIMER
  function updateTimer() {
    recSecs++;
    const h = Math.floor(recSecs / 3600);
    const m = Math.floor((recSecs % 3600) / 60);
    const s = recSecs % 60;
    let str = '';
    if (h > 0) str = `${h}:${pad(m)}:${pad(s)}`;
    else str = `${pad(m)}:${pad(s)}`;
    document.getElementById('recTime').textContent = str;
  }

  function pad(n) { return String(n).padStart(2,'0'); }

  // DETAIL
  function openDetail(idx) {
    currentDetailIndex = idx;
    const s = sessions[idx];
    document.getElementById('detailTitleEdit').value = s.name || 'New Recording';
    document.getElementById('detailMeta').textContent = formatDetailMeta(s);
    const tt = document.getElementById('detailTranscriptText');
    if (s.transcript && s.transcript.trim()) {
      tt.className = 'detail-transcript-text';
      tt.textContent = s.transcript;
    } else {
      tt.className = 'detail-no-transcript';
      tt.textContent = 'No transcript available';
    }
    document.getElementById('detailScreen').classList.add('open');
  }

  function closeDetail() {
    // Save any name edit
    if (currentDetailIndex >= 0) {
      const newName = document.getElementById('detailTitleEdit').value.trim();
      if (newName) {
        sessions[currentDetailIndex].name = newName;
        saveSessions();
        renderList();
      }
    }
    document.getElementById('detailScreen').classList.remove('open');
    currentDetailIndex = -1;
  }

  function deleteCurrentSession() {
    if (currentDetailIndex < 0) return;
    if (!confirm('Delete this recording?')) return;
    sessions.splice(currentDetailIndex, 1);
    saveSessions();
    renderList();
    document.getElementById('detailScreen').classList.remove('open');
    currentDetailIndex = -1;
  }

  function shareRecording() {
    if (currentDetailIndex < 0) return;
    const s = sessions[currentDetailIndex];
    const text = `${s.name}\n${formatDetailMeta(s)}\n\n${s.transcript || '(no transcript)'}`;
    if (navigator.share) {
      navigator.share({ title: s.name, text });
    } else {
      navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard'));
    }
  }

  // SEARCH
  function toggleSearch() {
    searchVisible = !searchVisible;
    const bar = document.getElementById('searchBar');
    const input = document.getElementById('searchInput');
    bar.style.display = searchVisible ? 'flex' : 'none';
    if (searchVisible) { input.focus(); }
    else { input.value = ''; renderList(); }
  }

  function filterSessions() {
    renderList(document.getElementById('searchInput').value);
  }

  // UTILS
  function formatRecName(date) {
    return date.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' }) +
      ' at ' + date.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  }

  function formatDateGroup(dateStr) {
    if (!dateStr) return 'Recordings';
    const d = new Date(dateStr + 'T12:00:00');
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const yesterday = new Date(now - 86400000).toISOString().split('T')[0];
    if (dateStr === today) return 'Today';
    if (dateStr === yesterday) return 'Yesterday';
    const diffDays = Math.floor((now - d) / 86400000);
    if (diffDays < 7) return d.toLocaleDateString('en-US', { weekday:'long' });
    return d.toLocaleDateString('en-US', { month:'long', year:'numeric' });
  }

  function formatDetailMeta(s) {
    const d = s.date ? new Date(s.date + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' }) : '';
    return [d, s.time, s.duration].filter(Boolean).join(' · ');
  }

  function formatDur(secs) {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return `${m}:${pad(s)}`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

</body>
